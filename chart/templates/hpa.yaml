apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: planzoco
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: planzoco
  minReplicas: {{ .Values.replicaCount }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetCPUUtilizationPercentage }}
